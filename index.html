<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canal Chollos España</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 70px 20px;
      max-width: 600px;
      margin: auto;
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 25px;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 38px;
      margin: 10px 0;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 16px 28px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      font-size: 18px;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(34,197,94,0.3);
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .secondary {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }

    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img class="logo" src="logo.jpg?v=1" alt="Canal Chollos">

    <h1>🔥 Canal Chollos</h1>

    <p>
      Los mejores chollos diarios de España.<br>
      Ofertas limitadas, actualizadas cada día.
    </p>

    <!-- BOTÓN TELEGRAM -->
    <a class="btn" href="https://t.me/s/canalcholloses" target="_blank">
      🚀 Entrar al canal de Telegram
    </a>

    <div class="secondary">
      🔔 Acceso gratuito • Sin spam • Ofertas reales
    </div>

    <footer>
      🚧 Web en construcción — versión beta
    </footer>

  </div>

</body>
</html>
