<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canal Chollos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    img {
      width: 180px;
      height: 180px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 38px;
      margin: 10px 0;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 15px 28px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      font-size: 18px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- IMAGEN -->
    <img src="logo.png" alt="Canal Chollos">

    <h1>🔥 Canal Chollos</h1>
    <p>Los mejores chollos diarios en España. Acceso anticipado a ofertas.</p>

    <!-- BOTÓN TELEGRAM -->
    <a class="btn" href="https://t.me/s/canalcholloses" target="_blank">
      🚀 Entrar al canal de Telegram
    </a>

    <footer>
      Próximamente web completa de chollos
    </footer>

  </div>

</body>
</html>
